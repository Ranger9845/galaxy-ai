<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Galaxy AI</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --bg:#0a0814;--panel:#110f1e;--surface:#1a1730;--border:#2e2a50;
      --purple:#7c5cfc;--purple-light:#a78bfa;--purple-glow:rgba(124,92,252,0.25);
      --text:#e2e0ff;--muted:#8b87c0;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;}
    #root{height:100dvh;display:flex;flex-direction:column;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    /* Stars */
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:
        radial-gradient(1px 1px at 15% 25%,rgba(255,255,255,.35) 0%,transparent 100%),
        radial-gradient(1px 1px at 65% 12%,rgba(255,255,255,.2) 0%,transparent 100%),
        radial-gradient(1px 1px at 82% 58%,rgba(255,255,255,.3) 0%,transparent 100%),
        radial-gradient(1px 1px at  8% 72%,rgba(255,255,255,.2) 0%,transparent 100%),
        radial-gradient(1px 1px at 40% 88%,rgba(255,255,255,.25) 0%,transparent 100%),
        radial-gradient(1px 1px at 91% 38%,rgba(255,255,255,.2) 0%,transparent 100%),
        radial-gradient(1px 1px at 52% 45%,rgba(255,255,255,.15) 0%,transparent 100%),
        radial-gradient(1px 1px at 28% 62%,rgba(255,255,255,.2) 0%,transparent 100%),
        radial-gradient(2px 2px at 75% 80%,rgba(167,139,250,.4) 0%,transparent 100%),
        radial-gradient(2px 2px at 32% 18%,rgba(124,92,252,.3) 0%,transparent 100%);}

    /* Glow effect */
    .glow{box-shadow:0 0 16px var(--purple-glow);transition:box-shadow .2s;}
    .glow:hover{box-shadow:0 0 28px var(--purple-glow),0 0 56px rgba(124,92,252,.12);}

    /* Fade-up animation */
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .3s ease;}

    /* Pulse for live indicator */
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

    /* Typing dots */
    .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--purple-light);}
    @keyframes blink{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1.1);opacity:1}}
    .dot:nth-child(1){animation:blink 1.2s infinite;}
    .dot:nth-child(2){animation:blink 1.2s .2s infinite;}
    .dot:nth-child(3){animation:blink 1.2s .4s infinite;}

    /* Onboarding step slide */
    @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
    .slide-in{animation:slideIn .35s ease;}

    /* Nebula gradient for onboarding */
    .nebula{background:radial-gradient(ellipse at 50% 0%,rgba(124,92,252,.18) 0%,transparent 70%),
            radial-gradient(ellipse at 80% 100%,rgba(167,139,250,.12) 0%,transparent 60%);}

    /* Galaxy avatar pulse */
    @keyframes avatarPulse{0%,100%{box-shadow:0 0 0 0 rgba(124,92,252,.4)}50%{box-shadow:0 0 0 12px rgba(124,92,252,0)}}
    .avatar-pulse{animation:avatarPulse 2s ease infinite;}

    @media(max-width:768px){.desktop-only{display:none!important;}}
    @media(min-width:769px){.mobile-only{display:none!important;}}
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── WebSocket hook ───────────────────────────────────────────────────────────
function useGalaxy() {
  const wsRef = useRef(null);
  const [connected, setConnected]     = useState(false);
  const [hasApiKey, setHasApiKey]     = useState(false);
  const [hasProfile, setHasProfile]   = useState(null); // null = loading
  const [userName, setUserName]       = useState('');
  const [provider, setProvider]       = useState('');
  const [screenshot, setScreenshot]   = useState(null);
  const [isStreaming, setIsStreaming]  = useState(false);
  const [isThinking, setIsThinking]   = useState(false);
  const [executing, setExecuting]     = useState([]);
  const [memorySaved, setMemorySaved] = useState(null); // flash notification
  const [memory, setMemory]           = useState({});
  const [messages, setMessages]       = useState([]);

  useEffect(() => {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    connect(`${proto}//${location.host}`);
    return () => wsRef.current?.close();
  }, []);

  function connect(url) {
    const ws = new WebSocket(url);
    wsRef.current = ws;
    ws.onopen  = () => setConnected(true);
    ws.onclose = () => { setConnected(false); setTimeout(() => connect(url), 3000); };
    ws.onerror = () => ws.close();
    ws.onmessage = e => handle(JSON.parse(e.data));
  }

  function handle(msg) {
    switch(msg.type) {
      case 'status':
        setHasApiKey(msg.hasApiKey);
        setHasProfile(msg.hasProfile);
        setUserName(msg.userName || '');
        setProvider(msg.provider);
        if (!msg.hasProfile) break;
        // Profile exists — show welcome message
        setMessages([{
          id: 'welcome', role: 'galaxy', ts: Date.now(),
          content: `Hey${msg.userName ? ', **' + msg.userName + '**' : ''}! 🌌 I'm Galaxy — I can control this PC and help you with anything.\n\nI can see your screen, click, type, open apps, manage files — basically anything you'd do yourself. What do you need?`
        }]);
        break;
      case 'screenshot':
        if (msg.data) setScreenshot(`data:image/jpeg;base64,${msg.data}`);
        break;
      case 'thinking':
        setIsThinking(true);
        break;
      case 'message':
        setIsThinking(false);
        setMessages(prev => [...prev, { id: Date.now(), role: msg.role, content: msg.content, thinking: msg.thinking, ts: Date.now() }]);
        break;
      case 'actions_start': setExecuting([]); break;
      case 'action_executing':
        setExecuting(prev => [...prev, { ...msg.action, status: 'running' }]);
        break;
      case 'action_done':
        setExecuting(prev => prev.map((a,i) => i === msg.index ? {...a, status:'done'} : a));
        break;
      case 'actions_done': setExecuting([]); break;
      case 'stream_started': setIsStreaming(true); break;
      case 'stream_stopped': setIsStreaming(false); break;
      case 'memory_saved':
        setMemorySaved(msg.entries);
        setTimeout(() => setMemorySaved(null), 3000);
        break;
      case 'memory':
        setMemory(msg.data || {});
        break;
      case 'profile_saved':
        setHasProfile(true);
        setUserName(msg.profile?.name || '');
        setMessages([{
          id: 'welcome-post-onboard', role: 'galaxy', ts: Date.now(),
          content: `Nice to meet you, **${msg.profile?.name || 'you'}**! 🌌\n\nI've saved your profile and I'll use it to help you better. I'll also remember useful things as we work together.\n\nWhat should we do first?`
        }]);
        break;
      case 'history_cleared':
        setMessages(prev => prev.filter(m => m.id === 'welcome' || m.id === 'welcome-post-onboard'));
        break;
    }
  }

  function send(data) {
    if (wsRef.current?.readyState === 1) wsRef.current.send(JSON.stringify(data));
  }

  return {
    connected, hasApiKey, hasProfile, userName, provider,
    screenshot, isStreaming, isThinking, executing, memorySaved, memory,
    messages,
    sendMessage:    text => send({ type: 'chat', text }),
    requestScreen:  ()   => send({ type: 'screenshot' }),
    startStream:    fps  => send({ type: 'stream_start', fps: fps || 2 }),
    stopStream:     ()   => send({ type: 'stream_stop' }),
    sendControl:    a    => send({ type: 'control', action: a }),
    saveProfile:    p    => send({ type: 'save_profile', profile: p }),
    clearHistory:   ()   => send({ type: 'clear_history' }),
    getMemory:      ()   => send({ type: 'get_memory' }),
    forgetKey:      k    => send({ type: 'forget', key: k }),
    addUserMessage: content => setMessages(prev => [...prev, { id: Date.now(), role: 'user', content, ts: Date.now() }])
  };
}

// ─── Markdown (minimal) ───────────────────────────────────────────────────────
function md(t) {
  if (!t) return '';
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code style="background:#1a1730;padding:2px 6px;border-radius:3px;font-size:.85em;font-family:monospace">$1</code>')
    .replace(/\n/g,'<br>');
}

// ─── Onboarding wizard ────────────────────────────────────────────────────────
const ROLES   = ['Developer / Engineer','Student','Business Owner','Creative (Designer/Artist)','Gamer','Something else'];
const TASKS   = ['Coding','Gaming','3D Printing','Video / Photo editing','Writing','Research','Business / work stuff','Watching content'];
const TONES   = [
  { id:'casual',       label:'Casual',       desc:'Friendly, laid-back — like texting a friend' },
  { id:'professional', label:'Professional', desc:'Polished and concise — all business' }
];

function Onboarding({ onComplete }) {
  const [step, setStep]     = useState(0); // 0=welcome 1=name 2=role 3=tasks 4=tone 5=context 6=done
  const [name, setName]     = useState('');
  const [role, setRole]     = useState('');
  const [tasks, setTasks]   = useState([]);
  const [tone, setTone]     = useState('casual');
  const [context, setCtx]   = useState('');
  const [animKey, setAKey]  = useState(0);

  const TOTAL = 6;

  function next() { setAKey(k => k+1); setStep(s => s+1); }

  function toggleTask(t) {
    setTasks(prev => prev.includes(t) ? prev.filter(x=>x!==t) : [...prev,t]);
  }

  function finish() {
    onComplete({ name: name.trim(), role, tasks, tone, context: context.trim() });
    next(); // show done step briefly
  }

  const STEPS = [
    // 0: Welcome
    () => (
      <div className="text-center max-w-sm mx-auto slide-in" key={animKey}>
        <div className="w-24 h-24 rounded-full mx-auto mb-6 flex items-center justify-center text-5xl avatar-pulse"
             style={{background:'rgba(124,92,252,.2)',border:'2px solid rgba(124,92,252,.4)'}}>
          🌌
        </div>
        <h2 className="text-2xl font-bold mb-3" style={{color:'var(--text)'}}>Hi, I'm Galaxy</h2>
        <p className="text-sm leading-relaxed mb-8" style={{color:'var(--muted)'}}>
          I'm an AI that can control this PC remotely from any device.<br/>
          Before we start, let me learn a bit about you so I can help you better.
        </p>
        <button onClick={next} className="px-8 py-3 rounded-xl font-semibold glow"
                style={{background:'rgba(124,92,252,.3)',color:'var(--purple-light)',border:'1px solid rgba(124,92,252,.5)'}}>
          Let's go →
        </button>
      </div>
    ),

    // 1: Name
    () => (
      <div className="max-w-sm mx-auto slide-in" key={animKey}>
        <GalaxyPrompt text="What's your name?" />
        <input
          autoFocus
          value={name}
          onChange={e=>setName(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&name.trim()&&next()}
          placeholder="Your name..."
          className="w-full px-4 py-3 rounded-xl text-base outline-none mb-6"
          style={{background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text)',caretColor:'var(--purple-light)'}}
        />
        <NextBtn disabled={!name.trim()} onClick={next} />
      </div>
    ),

    // 2: Role
    () => (
      <div className="max-w-sm mx-auto slide-in" key={animKey}>
        <GalaxyPrompt text={`Nice to meet you, ${name}! What do you do?`} />
        <div className="grid grid-cols-2 gap-2 mb-6">
          {ROLES.map(r => (
            <button key={r} onClick={()=>setRole(r)}
                    className="px-3 py-2.5 rounded-xl text-sm text-left"
                    style={{
                      background: role===r ? 'rgba(124,92,252,.3)' : 'var(--surface)',
                      border: `1px solid ${role===r ? 'rgba(124,92,252,.6)' : 'var(--border)'}`,
                      color: role===r ? 'var(--purple-light)' : 'var(--text)'
                    }}>
              {r}
            </button>
          ))}
        </div>
        <NextBtn disabled={!role} onClick={next} />
      </div>
    ),

    // 3: Tasks
    () => (
      <div className="max-w-sm mx-auto slide-in" key={animKey}>
        <GalaxyPrompt text="What do you mainly use this PC for? (pick all that apply)" />
        <div className="grid grid-cols-2 gap-2 mb-6">
          {TASKS.map(t => (
            <button key={t} onClick={()=>toggleTask(t)}
                    className="px-3 py-2.5 rounded-xl text-sm text-left"
                    style={{
                      background: tasks.includes(t) ? 'rgba(124,92,252,.3)' : 'var(--surface)',
                      border: `1px solid ${tasks.includes(t) ? 'rgba(124,92,252,.6)' : 'var(--border)'}`,
                      color: tasks.includes(t) ? 'var(--purple-light)' : 'var(--text)'
                    }}>
              {tasks.includes(t) ? '✓ ' : ''}{t}
            </button>
          ))}
        </div>
        <NextBtn disabled={tasks.length===0} onClick={next} label="Continue" />
      </div>
    ),

    // 4: Tone
    () => (
      <div className="max-w-sm mx-auto slide-in" key={animKey}>
        <GalaxyPrompt text="How should I talk to you?" />
        <div className="flex flex-col gap-3 mb-6">
          {TONES.map(t => (
            <button key={t.id} onClick={()=>setTone(t.id)}
                    className="px-4 py-3 rounded-xl text-left"
                    style={{
                      background: tone===t.id ? 'rgba(124,92,252,.25)' : 'var(--surface)',
                      border: `1px solid ${tone===t.id ? 'rgba(124,92,252,.55)' : 'var(--border)'}`,
                      color: tone===t.id ? 'var(--purple-light)' : 'var(--text)'
                    }}>
              <div className="font-semibold text-sm">{tone===t.id ? '● ' : '○ '}{t.label}</div>
              <div className="text-xs mt-0.5" style={{color:'var(--muted)'}}>{t.desc}</div>
            </button>
          ))}
        </div>
        <NextBtn onClick={next} />
      </div>
    ),

    // 5: Context
    () => (
      <div className="max-w-sm mx-auto slide-in" key={animKey}>
        <GalaxyPrompt text="Anything else I should know about you or your work? (optional)" />
        <textarea
          value={context}
          onChange={e=>setCtx(e.target.value)}
          placeholder={`e.g. I run a 3D printing store, I work from home, I use VS Code for everything...`}
          rows={4}
          className="w-full px-4 py-3 rounded-xl text-sm resize-none outline-none mb-6"
          style={{background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text)',caretColor:'var(--purple-light)',lineHeight:'1.6'}}
        />
        <div className="flex gap-3">
          <button onClick={finish} className="flex-1 py-2.5 rounded-xl text-sm"
                  style={{background:'var(--surface)',color:'var(--muted)',border:'1px solid var(--border)'}}>
            Skip
          </button>
          <button onClick={finish} className="flex-1 py-2.5 rounded-xl text-sm font-semibold glow"
                  style={{background:'rgba(124,92,252,.3)',color:'var(--purple-light)',border:'1px solid rgba(124,92,252,.5)'}}>
            All done →
          </button>
        </div>
      </div>
    ),

    // 6: Done
    () => (
      <div className="text-center max-w-sm mx-auto slide-in" key={animKey}>
        <div className="text-5xl mb-4">🌌</div>
        <h2 className="text-xl font-bold mb-2" style={{color:'var(--text)'}}>All set, {name}!</h2>
        <p className="text-sm" style={{color:'var(--muted)'}}>I've saved your profile. I'll remember useful things as we work together.</p>
        <div className="mt-4 text-2xl">✨</div>
      </div>
    )
  ];

  return (
    <div className="fixed inset-0 flex flex-col items-center justify-center px-6 z-50 nebula"
         style={{background:'var(--bg)'}}>
      <div className="stars"/>

      {/* Progress dots */}
      {step > 0 && step < TOTAL && (
        <div className="flex gap-2 mb-8">
          {Array.from({length:TOTAL-1},(_,i) => (
            <div key={i} className="w-2 h-2 rounded-full transition-all"
                 style={{background: i < step ? 'var(--purple)' : i === step-1 ? 'var(--purple-light)' : 'var(--border)',
                         width: i === step-1 ? '20px' : '8px'}}/>
          ))}
        </div>
      )}

      {/* Current step */}
      <div className="w-full max-w-sm relative z-10">
        {STEPS[step]?.()}
      </div>

      {/* Skip all link (only early steps) */}
      {step > 0 && step < 5 && (
        <button onClick={()=>{setStep(6);onComplete({name,role,tasks,tone,context});}}
                className="mt-6 text-xs" style={{color:'var(--muted)'}}>
          Skip setup
        </button>
      )}
    </div>
  );
}

function GalaxyPrompt({ text }) {
  return (
    <div className="flex gap-3 mb-5">
      <div className="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-base"
           style={{background:'rgba(124,92,252,.2)',border:'1px solid rgba(124,92,252,.35)'}}>
        🌌
      </div>
      <div className="px-3 py-2 rounded-2xl rounded-tl-sm text-sm"
           style={{background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text)',lineHeight:'1.5'}}>
        {text}
      </div>
    </div>
  );
}

function NextBtn({ onClick, disabled, label='Continue →' }) {
  return (
    <button onClick={onClick} disabled={disabled}
            className="w-full py-3 rounded-xl text-sm font-semibold glow"
            style={{
              background: disabled ? 'var(--surface)' : 'rgba(124,92,252,.3)',
              color: disabled ? 'var(--muted)' : 'var(--purple-light)',
              border: `1px solid ${disabled ? 'var(--border)' : 'rgba(124,92,252,.5)'}`,
              cursor: disabled ? 'default' : 'pointer'
            }}>
      {label}
    </button>
  );
}

// ─── Screen panel ─────────────────────────────────────────────────────────────
function ScreenPanel({ screenshot, isStreaming, startStream, stopStream, onScreenshot, onControl, connected }) {
  const imgRef = useRef(null);
  const [clickMode, setClickMode] = useState(false);
  const [nSize, setNSize] = useState({ w:1920, h:1080 });
  const [lastClick, setLastClick] = useState(null);

  useEffect(() => {
    if (screenshot && imgRef.current) {
      const img = imgRef.current;
      img.onload = () => setNSize({ w: img.naturalWidth, h: img.naturalHeight });
    }
  }, [screenshot]);

  function handleClick(e) {
    if (!clickMode || !imgRef.current) return;
    const r = imgRef.current.getBoundingClientRect();
    const x = Math.round((e.clientX - r.left)  * (nSize.w / r.width));
    const y = Math.round((e.clientY - r.top)   * (nSize.h / r.height));
    setLastClick({ x, y });
    onControl({ type:'click', x, y });
  }

  return (
    <div className="flex flex-col h-full" style={{background:'var(--panel)'}}>
      {/* Toolbar */}
      <div className="flex items-center gap-2 px-3 py-2 border-b flex-wrap" style={{borderColor:'var(--border)'}}>
        <span className="text-xs font-semibold" style={{color:'var(--muted)'}}>SCREEN</span>
        <div className="flex-1"/>
        {connected && <>
          <Btn onClick={onScreenshot} label="📷 Snap"/>
          <Btn onClick={isStreaming ? stopStream : ()=>startStream(2)}
               label={isStreaming ? '⏹ Stop' : '▶ Stream'}
               active={isStreaming} danger={isStreaming}/>
          <Btn onClick={()=>setClickMode(m=>!m)} label={clickMode ? '🎯 ON' : '🖱️ Click'} active={clickMode}/>
        </>}
      </div>

      {/* Image */}
      <div className="flex-1 relative overflow-hidden flex items-center justify-center"
           style={{background:'#000',cursor:clickMode?'crosshair':'default'}}>
        {screenshot
          ? <>
              <img ref={imgRef} src={screenshot} alt="PC Screen"
                   style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',display:'block'}}
                   onClick={handleClick}/>
              {isStreaming && (
                <div className="absolute top-2 right-2 flex items-center gap-1.5 text-xs px-2 py-1 rounded"
                     style={{background:'rgba(0,0,0,.75)',color:'var(--red)'}}>
                  <span style={{width:6,height:6,borderRadius:'50%',background:'var(--red)',display:'inline-block',animation:'pulse 1s infinite'}}/>
                  LIVE
                </div>
              )}
              {clickMode && lastClick && (
                <div className="absolute bottom-2 left-2 text-xs px-2 py-1 rounded"
                     style={{background:'rgba(0,0,0,.75)',color:'var(--purple-light)'}}>
                  ✓ Clicked ({lastClick.x}, {lastClick.y})
                </div>
              )}
            </>
          : <div className="text-center" style={{color:'var(--muted)'}}>
              <div className="text-5xl mb-3">🖥️</div>
              <div className="text-sm mb-3">No screenshot yet</div>
              {connected && <Btn onClick={onScreenshot} label="Take Screenshot"/>}
            </div>
        }
      </div>

      {/* Quick keys */}
      {connected && (
        <div className="flex items-center gap-1 px-2 py-1.5 border-t flex-wrap" style={{borderColor:'var(--border)'}}>
          {[['⊞ Win','{LWIN}'],['Ctrl+C','^c'],['Ctrl+V','^v'],['Ctrl+Z','^z'],
            ['Alt+F4','%{F4}'],['Alt+Tab','%{TAB}'],['F5','{F5}'],['Esc','{ESC}']].map(([l,k])=>(
            <button key={l} onClick={()=>onControl({type:'key',key:k})}
                    className="text-xs px-2 py-0.5 rounded"
                    style={{background:'var(--surface)',color:'var(--muted)',border:'1px solid var(--border)'}}>
              {l}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function Btn({ onClick, label, active, danger }) {
  return (
    <button onClick={onClick} className="text-xs px-2 py-1 rounded glow"
            style={{
              background: active ? (danger ? 'rgba(248,113,113,.15)' : 'rgba(124,92,252,.2)') : 'var(--surface)',
              color: active ? (danger ? 'var(--red)' : 'var(--purple-light)') : 'var(--muted)',
              border: `1px solid ${active ? (danger ? 'rgba(248,113,113,.35)' : 'rgba(124,92,252,.4)') : 'var(--border)'}`
            }}>
      {label}
    </button>
  );
}

// ─── Memory panel ─────────────────────────────────────────────────────────────
function MemoryPanel({ memory, onForget, onClose, onRefresh }) {
  const keys = Object.keys(memory);
  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center px-4"
         style={{background:'rgba(0,0,0,.6)',backdropFilter:'blur(4px)'}}>
      <div className="w-full max-w-sm rounded-2xl overflow-hidden"
           style={{background:'var(--panel)',border:'1px solid var(--border)'}}>
        <div className="flex items-center gap-2 px-4 py-3 border-b" style={{borderColor:'var(--border)'}}>
          <span className="font-semibold text-sm">🧠 Galaxy's Memory</span>
          <div className="flex-1"/>
          <button onClick={onRefresh} className="text-xs px-2 py-1 rounded"
                  style={{background:'var(--surface)',color:'var(--muted)',border:'1px solid var(--border)'}}>
            Refresh
          </button>
          <button onClick={onClose} className="text-xs px-2 py-1 rounded"
                  style={{background:'var(--surface)',color:'var(--muted)',border:'1px solid var(--border)'}}>
            ✕
          </button>
        </div>
        <div className="max-h-96 overflow-y-auto p-4">
          {keys.length === 0 ? (
            <p className="text-sm text-center py-4" style={{color:'var(--muted)'}}>
              No memories yet. Galaxy will save useful things as you work together.
            </p>
          ) : (
            <div className="space-y-2">
              {keys.map(k => (
                <div key={k} className="flex items-start gap-2 p-2 rounded-lg"
                     style={{background:'var(--surface)',border:'1px solid var(--border)'}}>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-semibold" style={{color:'var(--purple-light)'}}>{k}</div>
                    <div className="text-xs mt-0.5" style={{color:'var(--text)'}}>{memory[k].value}</div>
                    <div className="text-xs mt-0.5" style={{color:'var(--muted)'}}>
                      {new Date(memory[k].savedAt).toLocaleDateString()}
                    </div>
                  </div>
                  <button onClick={()=>onForget(k)} className="text-xs mt-0.5 flex-shrink-0"
                          style={{color:'var(--muted)'}}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="px-4 py-3 border-t text-xs" style={{borderColor:'var(--border)',color:'var(--muted)'}}>
          Galaxy saves things automatically. You can delete any entry above.
        </div>
      </div>
    </div>
  );
}

// ─── Chat panel ───────────────────────────────────────────────────────────────
function ChatPanel({ messages, isThinking, executing, onSend, onClear, connected, hasApiKey, memorySaved }) {
  const [input, setInput] = useState('');
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, isThinking, executing]);

  function send() {
    const t = input.trim();
    if (!t || !connected) return;
    onSend(t);
    setInput('');
  }

  const SUGGESTIONS = [
    'Take a screenshot',
    'Open Notepad',
    'What apps are running?',
    'Open Chrome and search Google',
    'List my Downloads folder',
    'Type "Hello" in the active window'
  ];

  return (
    <div className="flex flex-col h-full" style={{background:'var(--panel)'}}>
      {/* Toolbar */}
      <div className="flex items-center gap-2 px-3 py-2 border-b" style={{borderColor:'var(--border)'}}>
        <div className="text-lg">🌌</div>
        <span className="font-semibold text-sm">Galaxy</span>
        <div className="flex-1"/>
        {!hasApiKey && (
          <span className="text-xs px-2 py-0.5 rounded"
                style={{background:'rgba(251,191,36,.15)',color:'var(--yellow)',border:'1px solid rgba(251,191,36,.3)'}}>
            ⚠️ No API key
          </span>
        )}
        <button onClick={onClear} className="text-xs px-2 py-1 rounded"
                style={{background:'var(--surface)',color:'var(--muted)',border:'1px solid var(--border)'}}>
          🗑 Clear
        </button>
      </div>

      {/* Memory flash */}
      {memorySaved && (
        <div className="mx-3 mt-2 px-3 py-1.5 rounded-lg text-xs fade-up"
             style={{background:'rgba(124,92,252,.15)',color:'var(--purple-light)',border:'1px solid rgba(124,92,252,.3)'}}>
          🧠 Remembered: {memorySaved.map(e=>e.key).join(', ')}
        </div>
      )}

      {/* Messages */}
      <div className="flex-1 overflow-y-auto px-3 py-3 space-y-3">
        {messages.map(m => (
          <div key={m.id} className="fade-up">
            {m.role === 'user'
              ? <div className="flex justify-end">
                  <div className="max-w-xs px-3 py-2 rounded-2xl rounded-tr-sm text-sm"
                       style={{background:'rgba(124,92,252,.22)',border:'1px solid rgba(124,92,252,.3)',color:'var(--text)'}}>
                    {m.content}
                  </div>
                </div>
              : <div className="flex gap-2">
                  <div className="w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center text-sm"
                       style={{background:'rgba(124,92,252,.18)',border:'1px solid rgba(124,92,252,.3)'}}>
                    🌌
                  </div>
                  <div className="flex-1 max-w-sm">
                    {m.thinking && (
                      <div className="text-xs mb-1 px-2 py-1 rounded italic"
                           style={{background:'var(--surface)',color:'var(--muted)'}}>
                        💭 {m.thinking}
                      </div>
                    )}
                    <div className="px-3 py-2 rounded-2xl rounded-tl-sm text-sm"
                         style={{background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text)',lineHeight:'1.55'}}
                         dangerouslySetInnerHTML={{__html:md(m.content)}}/>
                  </div>
                </div>
            }
          </div>
        ))}

        {isThinking && (
          <div className="flex gap-2 fade-up">
            <div className="w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center text-sm"
                 style={{background:'rgba(124,92,252,.18)',border:'1px solid rgba(124,92,252,.3)'}}>
              🌌
            </div>
            <div className="px-3 py-2.5 rounded-2xl rounded-tl-sm flex items-center gap-1.5"
                 style={{background:'var(--surface)',border:'1px solid var(--border)'}}>
              <span className="dot"/><span className="dot"/><span className="dot"/>
            </div>
          </div>
        )}

        {executing.length > 0 && (
          <div className="fade-up text-xs px-3 py-2 rounded-xl space-y-1"
               style={{background:'rgba(124,92,252,.08)',border:'1px solid rgba(124,92,252,.2)'}}>
            <div className="font-semibold mb-1" style={{color:'var(--purple-light)'}}>⚡ Running…</div>
            {executing.map((a,i)=>(
              <div key={i} className="flex items-center gap-1.5" style={{color:'var(--muted)'}}>
                {a.status==='done'?'✅':'🔄'}
                <span className="font-mono">{a.type}</span>
                {a.x!=null && <span>({a.x},{a.y})</span>}
                {a.text && <span className="truncate max-w-24">"{a.text}"</span>}
                {a.app && <span>"{a.app}"</span>}
              </div>
            ))}
          </div>
        )}

        <div ref={bottomRef}/>
      </div>

      {/* Suggestions */}
      {messages.length <= 2 && connected && (
        <div className="px-3 pb-2">
          <div className="text-xs mb-1.5" style={{color:'var(--muted)'}}>Try asking:</div>
          <div className="flex flex-wrap gap-1.5">
            {SUGGESTIONS.map(s=>(
              <button key={s} onClick={()=>setInput(s)}
                      className="text-xs px-2.5 py-1 rounded-full"
                      style={{background:'var(--surface)',color:'var(--muted)',border:'1px solid var(--border)'}}>
                {s}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Input */}
      <div className="px-3 pb-3 pt-1 border-t" style={{borderColor:'var(--border)'}}>
        {!connected && (
          <div className="text-xs text-center mb-2 py-1.5 rounded"
               style={{background:'rgba(248,113,113,.1)',color:'var(--red)',border:'1px solid rgba(248,113,113,.2)'}}>
            🔴 Connecting…
          </div>
        )}
        <div className="flex gap-2">
          <textarea
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder={connected ? 'Tell Galaxy what to do…' : 'Waiting…'}
            disabled={!connected||isThinking}
            rows={1}
            className="flex-1 resize-none text-sm px-3 py-2 rounded-xl outline-none"
            style={{background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text)',
                    minHeight:'40px',maxHeight:'120px',lineHeight:'1.5',caretColor:'var(--purple-light)'}}
          />
          <button onClick={send} disabled={!connected||isThinking||!input.trim()}
                  className="px-3 rounded-xl glow flex items-center justify-center"
                  style={{
                    width:'44px',height:'40px',
                    background:(!connected||isThinking||!input.trim())?'var(--surface)':'rgba(124,92,252,.3)',
                    color:(!connected||isThinking||!input.trim())?'var(--muted)':'var(--purple-light)',
                    border:`1px solid ${(!connected||isThinking||!input.trim())?'var(--border)':'rgba(124,92,252,.5)'}`
                  }}>
            {isThinking
              ? <div style={{width:16,height:16,borderRadius:'50%',border:'2px solid var(--purple-light)',borderTopColor:'transparent',animation:'spin 1s linear infinite'}}/>
              : '→'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Main app ─────────────────────────────────────────────────────────────────
function App() {
  const g = useGalaxy();
  const [view, setView]         = useState('chat'); // chat|screen|split
  const [showMemory, setMemory] = useState(false);

  // Loading state while we wait for status
  if (g.hasProfile === null) {
    return (
      <div className="flex-1 flex items-center justify-center" style={{background:'var(--bg)'}}>
        <div className="stars"/>
        <div className="text-4xl" style={{animation:'pulse 1.5s infinite'}}>🌌</div>
      </div>
    );
  }

  // Onboarding (no profile yet)
  if (!g.hasProfile) {
    return <Onboarding onComplete={profile => g.saveProfile(profile)} />;
  }

  function handleSend(text) {
    g.addUserMessage(text);
    g.sendMessage(text);
    if (!g.isStreaming) g.requestScreen();
  }

  const chatEl = (
    <ChatPanel
      messages={g.messages}
      isThinking={g.isThinking}
      executing={g.executing}
      onSend={handleSend}
      onClear={g.clearHistory}
      connected={g.connected}
      hasApiKey={g.hasApiKey}
      memorySaved={g.memorySaved}
    />
  );

  const screenEl = (
    <ScreenPanel
      screenshot={g.screenshot}
      isStreaming={g.isStreaming}
      startStream={g.startStream}
      stopStream={g.stopStream}
      onScreenshot={g.requestScreen}
      onControl={g.sendControl}
      connected={g.connected}
    />
  );

  return (
    <div style={{height:'100dvh',display:'flex',flexDirection:'column',position:'relative',zIndex:1}}>
      <div className="stars"/>

      {/* Header */}
      <header className="flex items-center gap-3 px-4 py-2.5 border-b z-10"
              style={{borderColor:'var(--border)',background:'rgba(10,8,20,.95)',backdropFilter:'blur(10px)'}}>
        <div className="flex items-center gap-2">
          <div className="text-2xl">🌌</div>
          <div>
            <div className="font-bold text-sm tracking-wide">GALAXY AI</div>
            <div className="text-xs" style={{color:'var(--muted)'}}>
              {g.userName ? `Hey, ${g.userName}` : 'PC Remote Control'}
            </div>
          </div>
        </div>
        <div className="flex-1"/>

        {/* Memory button */}
        <button onClick={()=>{setMemory(true);g.getMemory();}}
                className="text-xs px-2 py-1 rounded glow"
                style={{background:'var(--surface)',color:'var(--muted)',border:'1px solid var(--border)'}}>
          🧠 Memory
        </button>

        {/* Connection */}
        <div className="flex items-center gap-1.5 text-xs">
          <div style={{width:6,height:6,borderRadius:'50%',
                       background:g.connected?'var(--green)':'var(--red)',
                       boxShadow:`0 0 6px ${g.connected?'var(--green)':'var(--red)'}`}}/>
          <span style={{color:g.connected?'var(--green)':'var(--red)'}}>
            {g.connected?'Connected':'Connecting…'}
          </span>
        </div>

        {/* View toggle desktop */}
        <div className="desktop-only flex gap-0.5 p-0.5 rounded-lg"
             style={{background:'var(--surface)',border:'1px solid var(--border)'}}>
          {[['chat','💬 Chat'],['split','⊞ Split'],['screen','🖥 Screen']].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)}
                    className="text-xs px-2.5 py-1 rounded"
                    style={{
                      background:view===v?'rgba(124,92,252,.25)':'transparent',
                      color:view===v?'var(--purple-light)':'var(--muted)',
                      border:`1px solid ${view===v?'rgba(124,92,252,.35)':'transparent'}`
                    }}>
              {l}
            </button>
          ))}
        </div>
      </header>

      {/* Content */}
      <main className="flex-1 overflow-hidden relative z-10">
        {/* Desktop */}
        <div className="desktop-only h-full" style={{display: view==='split'?'grid':'block', gridTemplateColumns:'1fr 1fr'}}>
          {view==='split'
            ? <><div className="h-full border-r" style={{borderColor:'var(--border)'}}>{chatEl}</div><div className="h-full">{screenEl}</div></>
            : view==='chat' ? chatEl : screenEl
          }
        </div>
        {/* Mobile */}
        <div className="mobile-only h-full">
          {view==='chat' ? chatEl : screenEl}
        </div>
      </main>

      {/* Mobile nav */}
      <nav className="mobile-only border-t z-10"
           style={{borderColor:'var(--border)',background:'rgba(10,8,20,.97)'}}>
        <div className="flex">
          {[['chat','💬','Chat'],['screen','🖥','Screen']].map(([v,i,l])=>(
            <button key={v} onClick={()=>setView(v)}
                    className="flex-1 flex flex-col items-center py-2"
                    style={{color:view===v?'var(--purple-light)':'var(--muted)'}}>
              <span className="text-xl">{i}</span>
              <span className="text-xs mt-0.5">{l}</span>
              {view===v && <div style={{width:4,height:4,borderRadius:'50%',background:'var(--purple)',marginTop:2}}/>}
            </button>
          ))}
        </div>
      </nav>

      {/* Memory panel */}
      {showMemory && (
        <MemoryPanel
          memory={g.memory}
          onForget={k=>{g.forgetKey(k);setTimeout(()=>g.getMemory(),300);}}
          onClose={()=>setMemory(false)}
          onRefresh={g.getMemory}
        />
      )}
    </div>
  );
}

// Spin keyframe for loading button
const style = document.createElement('style');
style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(style);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
